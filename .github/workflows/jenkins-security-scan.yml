name: Jenkins Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  security-scan:
    uses: jenkins-infra/jenkins-security-scan/.github/workflows/jenkins-security-scan.yaml@v2
    with:
      java-cache: 'maven'
    # CodeQL upload requires GitHub Advanced Security (org-level setting).
    # Remove continue-on-error once the plugin is under jenkins-infra hosting.
    continue-on-error: true
